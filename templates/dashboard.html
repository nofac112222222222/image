<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif; background: #0b1220; color: #e6edf3; display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .card { background: #111827; padding: 28px; border-radius: 12px; width: min(92vw, 520px); box-shadow: 0 10px 30px rgba(0,0,0,0.35); border: 1px solid #1f2937; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { color: #9aa4b2; }
    form { margin-top: 16px; }
    button { background: #ef4444; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome, {{ username }} 👋</h1>
    <p>You are now logged in. This is your dashboard.</p>
    <form method="post" action="{{ url_for('logout') }}">
      <button type="submit">Logout</button>
    </form>
  </div>
</body>
</html>
