<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading...</title>
  
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif; background: #0b1220; color: #e6edf3; display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .wrap { display: grid; gap: 16px; place-items: center; }
    .spinner { width: 52px; height: 52px; border-radius: 50%; border: 5px solid #1f2937; border-top-color: #60a5fa; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub { color: #9aa4b2; font-size: 14px; }
    a { color: #93c5fd; }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function(){ window.location.href = "{{ url_for('dashboard') }}"; }, 5000);
    });
  </script>
</head>
<body>
  <div class="wrap">
    <div class="spinner" aria-label="Loading"></div>
    <div>Loading your dashboard...</div>
    <div class="sub">You will be redirected in about 5 seconds.</div>
    <div class="sub"><a href="{{ url_for('dashboard') }}">Skip</a></div>
  </div>
</body>
</html>
