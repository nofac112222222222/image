<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif; background: #0b1220; color: #e6edf3; display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .card { background: #111827; padding: 28px; border-radius: 12px; width: min(92vw, 380px); box-shadow: 0 10px 30px rgba(0,0,0,0.35); border: 1px solid #1f2937; }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p.hint { margin-top: 6px; font-size: 12px; color: #9aa4b2; }
    form { display: grid; gap: 12px; margin-top: 16px; }
    label { font-size: 12px; color: #9aa4b2; }
    input { padding: 10px 12px; border-radius: 8px; border: 1px solid #374151; background: #0b1220; color: #e6edf3; }
    input:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.25); }
    button { background: #2563eb; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    .error { background: #7f1d1d; color: #fecaca; border: 1px solid #b91c1c; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="hint">Use username <strong>whiteout</strong> and password <strong>123</strong>.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required />
      </div>
      <div>
        <button type="submit">Login</button>
      </div>
    </form>
  </div>
</body>
</html>
